name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: stable
          cache-dependency-path: go/go.sum
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --check
      - run: gofmt -l go | tee /dev/stderr | wc -l | grep -q '^0$'
      - run: cargo clippy --release -- -D warnings

  build:
    name: ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Go c-archives use the GNU ABI, so Windows builds use the
          # -gnu/-gnullvm Rust targets with mingw toolchains instead of MSVC.
          - platform: darwin/arm64
            artifact: darwin-arm64
            runner: macos-14
            bin: target/release/pkgoci
          - platform: linux/amd64
            artifact: linux-amd64
            runner: ubuntu-latest
            bin: target/release/pkgoci
          - platform: linux/arm64
            artifact: linux-arm64
            runner: ubuntu-24.04-arm
            bin: target/release/pkgoci
          - platform: windows/amd64
            artifact: windows-amd64
            runner: windows-latest
            target: x86_64-pc-windows-gnu
            bin: target/x86_64-pc-windows-gnu/release/pkgoci.exe
          - platform: windows/arm64
            artifact: windows-arm64
            runner: windows-11-arm
            target: aarch64-pc-windows-gnullvm
            bin: target/aarch64-pc-windows-gnullvm/release/pkgoci.exe
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: stable
          cache-dependency-path: go/go.sum
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target || 'host' }}
      - name: Set up mingw (windows/amd64)
        if: matrix.platform == 'windows/amd64'
        shell: bash
        run: |
          gcc --version || choco install mingw -y --no-progress
          rustup target add x86_64-pc-windows-gnu
      - name: Set up llvm-mingw (windows/arm64)
        if: matrix.platform == 'windows/arm64'
        shell: bash
        run: |
          curl -fsSLO https://github.com/mstorsjo/llvm-mingw/releases/download/20260616/llvm-mingw-20260616-ucrt-aarch64.zip
          unzip -q llvm-mingw-20260616-ucrt-aarch64.zip -d "$RUNNER_TEMP"
          echo "$RUNNER_TEMP/llvm-mingw-20260616-ucrt-aarch64/bin" >> "$GITHUB_PATH"
          rustup target add aarch64-pc-windows-gnullvm
          {
            echo "PKGOCI_GO_CC=aarch64-w64-mingw32-clang"
            echo "CARGO_TARGET_AARCH64_PC_WINDOWS_GNULLVM_LINKER=aarch64-w64-mingw32-clang"
          } >> "$GITHUB_ENV"
      - name: Build
        shell: bash
        run: cargo build --release ${{ matrix.target && format('--target {0}', matrix.target) || '' }}
      - name: Test
        shell: bash
        run: cargo test --release ${{ matrix.target && format('--target {0}', matrix.target) || '' }}
      - name: Smoke test
        shell: bash
        run: |
          ./${{ matrix.bin }} --version
          ./${{ matrix.bin }} prefix
          ./${{ matrix.bin }} list
          ./${{ matrix.bin }} update
      - name: Sandboxed build smoke test (windows restricted token)
        if: matrix.platform == 'windows/amd64'
        shell: bash
        run: |
          export PKGOCI_PREFIX="$RUNNER_TEMP/prefix"
          B=./${{ matrix.bin }}
          mkdir -p winpkg/src
          printf '#include <stdio.h>\nint main(void){puts("sandboxed");return 0;}\n' > winpkg/src/hi.c
          printf '%s\n' 'NAME winhello' 'VERSION 1.0.0' \
            'RUN:windows mkdir out\bin && gcc src/hi.c -o out/bin/hi.exe' \
            'OUTPUT ./out' > winpkg/Pkgocifile
          $B build winpkg 2>&1 | tee build.log
          grep -q "Sandbox: restricted token" build.log
      - name: Install cosign (interop check)
        if: startsWith(matrix.platform, 'linux')
        uses: sigstore/cosign-installer@v3
      - name: End-to-end roundtrip (local registry)
        if: startsWith(matrix.platform, 'linux')
        shell: bash
        run: |
          docker run -d --rm --name reg -p 5001:5000 registry:2
          sleep 3
          export PKGOCI_REGISTRY=localhost:5001 PKGOCI_NAMESPACE=ci PKGOCI_PREFIX="$RUNNER_TEMP/prefix"
          B=./${{ matrix.bin }}
          mkdir -p /tmp/hello/bin
          printf '#!/bin/sh\necho "hello from pkgoci"\n' > /tmp/hello/bin/hello
          chmod +x /tmp/hello/bin/hello
          PLATFORM="linux/$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/')"
          mkdir -p /tmp/libfoo/out/lib && echo fake > /tmp/libfoo/out/lib/libfoo.so
          mkdir -p /tmp/hello/out/bin && mv /tmp/hello/bin/hello /tmp/hello/out/bin/hello && rmdir /tmp/hello/bin
          $B keygen
          # Docker-style flow: describe in a Pkgocifile, build, then push.
          for v in 1.0.0 1.4.2 2.0.0; do
            printf 'NAME libfoo\nVERSION %s\nDESCRIPTION Fake library\nLICENSE MIT\nPLATFORM %s ./out\n' "$v" "$PLATFORM" > /tmp/libfoo/Pkgocifile
            $B build /tmp/libfoo
            $B push "libfoo@$v" --sign
          done
          printf 'NAME hello\nVERSION 1.0.0\nDESCRIPTION CI test\nREQUIRES libfoo@^1\nPLATFORM %s ./out\n' "$PLATFORM" > /tmp/hello/Pkgocifile
          $B build /tmp/hello
          $B push hello --sign   # newest built version is picked
          # Install with signature verification; the solver must pick the
          # newest libfoo satisfying ^1 (1.4.2), not 2.0.0.
          export PKGOCI_VERIFY_KEY="$RUNNER_TEMP/prefix/keys/pkgoci.pub"
          $B install hello
          "$RUNNER_TEMP/prefix/bin/hello" | grep -q "hello from pkgoci"
          $B info hello | grep -q "Requires: libfoo@^1"
          $B list | grep -q "libfoo 1.4.2"
          $B verify libfoo
          # Conflicting constraints fail with a PubGrub explanation.
          printf 'NAME app\nVERSION 1.0.0\nREQUIRES libfoo@^2\nPLATFORM %s ./out\n' "$PLATFORM" > /tmp/hello/Pkgocifile
          $B build /tmp/hello && $B push app --sign
          if out=$($B install hello app --force 2>&1); then echo "conflict install must fail"; exit 1; fi
          echo "$out" | grep -q "version solving failed"
          # Signatures verify with stock cosign.
          cosign verify --key "$PKGOCI_VERIFY_KEY" --insecure-ignore-tlog=true \
            --allow-insecure-registry localhost:5001/ci/libfoo:1.4.2
          # Dependency protection.
          $B uninstall libfoo 2>&1 | grep -q "required by hello"
          # Unsigned and wrongly-signed packages are rejected.
          printf 'NAME unsigned\nVERSION 1.0.0\nPLATFORM %s ./out\n' "$PLATFORM" > /tmp/hello/Pkgocifile
          $B build /tmp/hello && $B push unsigned
          if $B install unsigned; then echo "unsigned install must fail"; exit 1; fi
          $B keygen --out /tmp/otherkeys
          if PKGOCI_VERIFY_KEY=/tmp/otherkeys/pkgoci.pub $B install hello --force; then echo "wrong-key install must fail"; exit 1; fi
          # Pushing an unbuilt package fails helpfully.
          if $B push nothere; then echo "push of unbuilt package must fail"; exit 1; fi
          # Build-from-source: SOURCE + RUN compile at build time, the source
          # ships with the package, and installs can rebuild it.
          mkdir -p /tmp/src/src
          printf '#include <stdio.h>\nint main(void){puts("compiled");return 0;}\n' > /tmp/src/src/hi.c
          printf 'NAME srchello\nVERSION 1.0.0\nSOURCE .\nRUN mkdir -p out/bin && cc src/hi.c -o out/bin/srchello\nOUTPUT ./out\n' > /tmp/src/Pkgocifile
          $B build /tmp/src
          $B push srchello --sign
          $B install srchello
          "$RUNNER_TEMP/prefix/bin/srchello" | grep -q compiled
          $B install srchello --force --build-from-source
          "$RUNNER_TEMP/prefix/bin/srchello" | grep -q compiled
          # Source builds run inside the docker sandbox: no network, and
          # writes confined to the mounted work tree.
          $B build /tmp/src 2>&1 | grep -q "Sandbox: docker"
          mkdir -p /tmp/evil
          printf 'NAME evil\nVERSION 1.0.0\nRUN mkdir -p out && curl -fsS --max-time 5 https://example.com -o out/x\nOUTPUT ./out\n' > /tmp/evil/Pkgocifile
          if $B build /tmp/evil; then echo "network in sandbox must fail"; exit 1; fi
          # Transparency log: record in public Rekor and verify the receipt.
          $B push srchello --sign --rekor
          $B verify srchello | grep -q "transparency log entry"
          # Signature + SLSA provenance verify with pkgoci and stock cosign.
          $B verify srchello | grep -q "build provenance"
          DIGEST=$(cosign verify --key "$PKGOCI_VERIFY_KEY" --insecure-ignore-tlog=true \
            --allow-insecure-registry localhost:5001/ci/srchello:1.0.0 2>/dev/null \
            | python3 -c "import json,sys; print(json.load(sys.stdin)[0]['critical']['image']['docker-manifest-digest'])")
          cosign verify-attestation --key "$PKGOCI_VERIFY_KEY" --type slsaprovenance1 \
            --insecure-ignore-tlog=true --allow-insecure-registry "localhost:5001/ci/srchello@$DIGEST"
          $B uninstall srchello
          # Upgrade flow.
          printf 'NAME hello\nVERSION 2.0.0\nDESCRIPTION CI test\nREQUIRES libfoo@^1\nPLATFORM %s ./out\n' "$PLATFORM" > /tmp/hello/Pkgocifile
          $B build /tmp/hello && $B push hello@2.0.0 --sign
          $B upgrade
          $B list | grep -q "hello 2.0.0"
          $B cleanup
          $B uninstall hello
          $B uninstall libfoo
          test ! -e "$RUNNER_TEMP/prefix/bin/hello"
      - name: Real-world packages (Fedora, Homebrew, and winget picks)
        if: matrix.platform == 'linux/amd64'
        shell: bash
        run: |
          export PKGOCI_REGISTRY=localhost:5001 PKGOCI_NAMESPACE=ci PKGOCI_PREFIX="$RUNNER_TEMP/prefix"
          export PKGOCI_VERIFY_KEY="$RUNNER_TEMP/prefix/keys/pkgoci.pub"
          B=./${{ matrix.bin }}
          # Two packages from each ecosystem, built from digest-pinned
          # upstream sources with the Pkgocifiles in examples/:
          #   Fedora: xz, sqlite | Homebrew: jq, lua | winget: ninja, zstd
          for pkg in xz sqlite jq lua ninja zstd; do
            $B build "examples/$pkg"
            $B push "$pkg" --sign
          done
          $B install xz sqlite jq lua ninja zstd
          "$RUNNER_TEMP/prefix/bin/xz" --version
          "$RUNNER_TEMP/prefix/bin/sqlite3" --version
          "$RUNNER_TEMP/prefix/bin/jq" --version
          "$RUNNER_TEMP/prefix/bin/lua" -v
          "$RUNNER_TEMP/prefix/bin/ninja" --version
          "$RUNNER_TEMP/prefix/bin/zstd" --version
          $B verify jq | grep -q "build provenance"
          # Rebuild one from its published source layer (RUN:linux path).
          $B install lua --force --build-from-source
          "$RUNNER_TEMP/prefix/bin/lua" -v
      - uses: actions/upload-artifact@v4
        with:
          name: pkgoci-${{ matrix.artifact }}
          path: ${{ matrix.bin }}
          if-no-files-found: error
